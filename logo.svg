<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Torch -->
  <g id="torch">
    <!-- Flame -->
    <path d="M200 80 Q190 100 190 120 Q190 140 200 150 Q210 140 210 120 Q210 100 200 80" fill="#FFA500"/>
    <path d="M185 110 Q175 120 175 135 Q175 150 185 155" fill="#FF8C00"/>
    <path d="M215 110 Q225 120 225 135 Q225 150 215 155" fill="#FF8C00"/>
    
    <!-- Torch handle -->
    <rect x="185" y="150" width="30" height="40" fill="#0F3B7F"/>
    <rect x="180" y="185" width="40" height="15" fill="#0F3B7F"/>
  </g>
  
  <!-- Shield -->
  <path d="M200 200 L120 240 L120 280 Q120 320 200 340 Q280 320 280 280 L280 240 Z" fill="none" stroke="#0F3B7F" stroke-width="8"/>
  
  <!-- Book inside shield -->
  <rect x="160" y="240" width="80" height="50" fill="#F5F0E8" stroke="#0F3B7F" stroke-width="2"/>
  <line x1="200" y1="240" x2="200" y2="290" stroke="#0F3B7F" stroke-width="2"/>
  
  <!-- Red diagonal stripe -->
  <path d="M240 220 L280 260" stroke="#CC1F2D" stroke-width="15"/>
  
  <!-- Green field (bottom of shield) -->
  <path d="M120 280 Q120 310 200 330 Q280 310 280 280" fill="#2A6B3C" opacity="0.3"/>
  
  <!-- Laurel wreaths -->
  <!-- Left wreath -->
  <g id="left-wreath">
    <path d="M100 260 Q80 240 85 210" fill="none" stroke="#2A6B3C" stroke-width="4"/>
    <ellipse cx="92" cy="235" rx="3" ry="8" fill="#2A6B3C"/>
    <ellipse cx="88" cy="225" rx="3" ry="8" fill="#2A6B3C"/>
    <ellipse cx="90" cy="215" rx="3" ry="8" fill="#2A6B3C"/>
  </g>
  
  <!-- Right wreath -->
  <g id="right-wreath">
    <path d="M300 260 Q320 240 315 210" fill="none" stroke="#2A6B3C" stroke-width="4"/>
    <ellipse cx="308" cy="235" rx="3" ry="8" fill="#2A6B3C"/>
    <ellipse cx="312" cy="225" rx="3" ry="8" fill="#2A6B3C"/>
    <ellipse cx="310" cy="215" rx="3" ry="8" fill="#2A6B3C"/>
  </g>
  
  <!-- YLAR Text -->
  <text x="200" y="360" font-size="60" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">
    <tspan fill="#0F3B7F">YL</tspan><tspan fill="#CC1F2D">AR</tspan>
  </text>
</svg>